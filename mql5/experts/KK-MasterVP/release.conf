# KK-MasterVP release manifest — consumed by scripts/make_release.sh
#
# One line per .set variant shipped in releases/<version>/:
#     <variant>   <source.set>   [KEY=VAL ...]
#   variant     -> tag appended to the release set name (KK-MasterVP-<ver>-<variant>.set)
#   source.set  -> dev preset in this folder used as the base
#   KEY=VAL ...  -> overrides applied to this variant only (prop builds tighten risk)
#
# Personal accounts run the locked configs as-swept; prop builds tighten the
# risk limiters to respect daily-loss / max-drawdown rules.

# --- Personal (as-swept) ----------------------------------------------------
xauusd-m5      KK-MasterVP-XAUUSD-M5.set
btcusd-m5      KK-MasterVP-BTCUSD-M5.set

# --- Prop (tighter risk: lower per-trade risk + harder DD caps) -------------
xauusd-m5-prop KK-MasterVP-XAUUSD-M5.set  InpRiskAccPct=0.5 InpMaxDailyDDPct=4.0 InpMaxPeakDDPct=8.0
btcusd-m5-prop KK-MasterVP-BTCUSD-M5.set  InpRiskAccPct=0.5 InpMaxDailyDDPct=4.0 InpMaxPeakDDPct=8.0
