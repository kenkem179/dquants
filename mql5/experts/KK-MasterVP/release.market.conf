# KK-MasterVP MQL5-Market edition manifest — consumed by scripts/make_release.sh
# (the optional [market] step). SINGLE-SOURCE model: Inputs.mqh is hand-curated,
# so the `input` keyword in the live source IS the visibility control — the dev
# build already IS the market build (no Inputs.release.mqh anymore). These .set
# variants are stripped to the user-facing (input-carrying) keys only. Flagship =
# XAUUSD M5 (the MT5-confirmed lock); the EA still runs on other symbols/TFs but
# is tuned for XAUUSD M5.
#
# STANDING RULE: only expose params (and comments) a user can actually understand
# — keep visible knobs + descriptions plain and user-friendly. Hide every
# strategy internal by dropping its `input` keyword in Inputs.mqh.
#
# Format (same as release.conf):
#     <variant>   <source.set>   [KEY=VAL ...]
#
# STANDING RULE: the prop variant encodes firm limits — Max daily loss 4.4% +
# Max account drawdown 9% (InpMaxDailyDDPct=4.4 / InpMaxPeakDDPct=9.0).

# --- Personal (as-locked) ---------------------------------------------------
xauusd-m5      KK-MasterVP-XAUUSD-M5.set

# --- Prop (tighter risk) ----------------------------------------------------
xauusd-m5-prop KK-MasterVP-XAUUSD-M5.set  InpRiskAccPct=0.5 InpMaxDailyDDPct=4.4 InpMaxPeakDDPct=9.0
