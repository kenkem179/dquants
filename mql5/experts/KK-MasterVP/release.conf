# KK-MasterVP release manifest — consumed by scripts/make_release.sh
#
# One line per .set variant shipped in releases/<version>/:
#     <variant>   <source.set>   [KEY=VAL ...]
#   variant     -> tag appended to the release set name (KK-MasterVP-<ver>-<variant>.set)
#   source.set  -> dev preset in this folder used as the base
#   KEY=VAL ...  -> overrides applied to this variant only (prop builds tighten risk)
#
# Personal accounts run the locked configs as-swept; prop builds tighten the
# risk limiters to respect daily-loss / max-drawdown rules. Every deployment
# variant enables the per-trade CSV log (InpExportParity=true -> MQL5\Files\
# KK-MasterVP\trades_<sym>_<tf>.csv) so trades are attributable per strategy.

# --- Personal (as-swept) ----------------------------------------------------
xauusd-m5      KK-MasterVP-XAUUSD-M5.set  InpExportParity=true
btcusd-m5      KK-MasterVP-BTCUSD-M5.set  InpExportParity=true

# --- Prop (tighter risk: lower per-trade risk + firm DD caps) ---------------
# STANDING RULE: prop variant encodes firm limits Max daily loss 4.4% + per-trade risk 0.43% + Max
# account drawdown ~10% (FN Stellar-2). DD GUARDS (2026-06-30, operator-set):
# soft-brake at 8.0% trailing-peak DD -> HALF risk (0.5x lots) to de-risk at the
# cliff edge (PeakDDLotMult is stateless -> auto-resets to full size once DD<8.0%),
# hard halt at 9.5% as the final backstop, safely below the firm's 10% line.
# (InpMaxDailyDDPct=4.4 / InpSoftBlockDDPct=8.0 / InpSoftBlockLotMult=0.5 / InpMaxPeakDDPct=9.5.)
xauusd-m5-prop KK-MasterVP-XAUUSD-M5.set  InpRiskAccPct=0.43 InpMaxDailyDDPct=4.4 InpSoftBlockDDPct=8.0 InpSoftBlockLotMult=0.5 InpMaxPeakDDPct=9.5 InpPropBaselineEquity=100000 InpExportParity=true
btcusd-m5-prop KK-MasterVP-BTCUSD-M5.set  InpRiskAccPct=0.43 InpMaxDailyDDPct=4.4 InpSoftBlockDDPct=8.0 InpSoftBlockLotMult=0.5 InpMaxPeakDDPct=9.5 InpPropBaselineEquity=100000 InpExportParity=true
# --- Mixed Portfolio: FundedNext Stellar-2 $100K (MasterVP M5 leg) -----------
# Shares ONE account with the KK-KenKem M1 leg; risk cut so the COMBINED book
# fits FN Stellar-2 (max daily 5% / max account DD 10%). Operator-set per-leg
# risk (2026-06-30): MasterVP XAU M5 0.43%, MasterVP BTC M5 0.15%, KenKem XAU M1
# 0.1% (KenKem leg). Joint DD caps (both EAs, on the SHARED equity HWM): daily
# 4.2%, soft-brake at 7.8% (0.4x lots), hard halt 9.2%. See KK-KenKem mixed leg.
xauusd-m5-mixed-fn KK-MasterVP-XAUUSD-M5.set  InpRiskAccPct=0.43 InpMaxDailyDDPct=4.2 InpMaxPeakDDPct=9.2 InpSoftBlockDDPct=7.8 InpSoftBlockLotMult=0.4 InpPropBaselineEquity=100000 InpExportParity=true
btcusd-m5-mixed-fn KK-MasterVP-BTCUSD-M5.set  InpRiskAccPct=0.15 InpMaxDailyDDPct=4.2 InpMaxPeakDDPct=9.2 InpSoftBlockDDPct=7.8 InpSoftBlockLotMult=0.4 InpPropBaselineEquity=100000 InpExportParity=true