# KK-KenKem release manifest — consumed by scripts/make_release.sh
#
# One line per .set variant shipped in releases/<version>/:
#     <variant>   <source.set>   [KEY=VAL ...]
#   variant     -> tag appended to the release set name (KK-KenKem-<ver>-<variant>.set)
#   source.set  -> dev preset in this folder used as the base
#   KEY=VAL ...  -> overrides applied to this variant only (prop builds tighten risk)
#
# Personal accounts run the locked config as-swept; prop builds tighten the risk
# limiters to respect the firm daily-loss / max-drawdown rules.
#
# LOCK = D5-E4Long (E1+E2+E4-long): MT5 +1427.17 / PF 1.428 / 126 tr, gate PASS.
#
# Every deployment variant keeps the per-trade journal (InpExportTradeJournal=true
# -> MQL5\Files\KenKem\trades_<sym>.csv) for attribution and turns OFF the heavy
# per-bar diagnostic (InpExportBarTrace=false) which is dev-only.

# --- Personal (as-swept lock) -----------------------------------------------
xauusd-m1      KK-KenKem-XAUUSD-M1-D5-E4Long.set  InpExportBarTrace=false

# --- Prop (firm limits: Max daily loss 4.4% + Max account drawdown 9%) -------
# STANDING RULE: prop variant encodes daily loss 4.4% and 9% account-DD ceiling.
# KenKem has no single hard-halt input, so the soft-block IS the 9% ceiling;
# slowdown eases off at 7% before it.
xauusd-m1-prop KK-KenKem-XAUUSD-M1-D5-E4Long.set  MAX_DAILY_LOSS_RATIO=0.044 ACCOUNT_DRAWDOWN_RATIO_TO_SLOWDOWN=0.07 ACCOUNT_DD_RATIO_TO_SOFT_BLOCK=0.09 InpExportBarTrace=false

# --- Mixed Portfolio: FundedNext Stellar-2 $100K (KenKem M1 leg) -------------
# Shares ONE account with the KK-MasterVP M5 leg; the gentle diversifier (0.2%
# risk). Joint DD caps with MasterVP: daily 3.5%, slowdown 5%, soft-block 8%.
# Values mirror the validated FN-Stellar2 set; see Presets/Mixed-Portfolio/README.md.
xauusd-m1-mixed-fn KK-KenKem-XAUUSD-M1-D5-E4Long.set  COMMON_MAX_RISK_PER_TRADE=0.002 MAX_DAILY_LOSS_RATIO=0.035 ACCOUNT_DRAWDOWN_RATIO_TO_SLOWDOWN=0.05 ACCOUNT_DD_RATIO_TO_SOFT_BLOCK=0.08 InpExportBarTrace=false
