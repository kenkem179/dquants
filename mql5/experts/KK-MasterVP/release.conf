# KK-MasterVP release manifest — consumed by scripts/make_release.sh
#
# One line per .set variant shipped in releases/<version>/:
#     <variant>   <source.set>   [KEY=VAL ...]
#   variant     -> tag appended to the release set name (KK-MasterVP-<ver>-<variant>.set)
#   source.set  -> dev preset in this folder used as the base
#   KEY=VAL ...  -> overrides applied to this variant only (prop builds tighten risk)
#
# Personal accounts run the locked configs as-swept; prop builds tighten the
# risk limiters to respect daily-loss / max-drawdown rules. Every deployment
# variant enables the per-trade CSV log (InpExportParity=true -> MQL5\Files\
# KK-MasterVP\trades_<sym>_<tf>.csv) so trades are attributable per strategy.

# --- Personal (as-swept) ----------------------------------------------------
xauusd-m5      KK-MasterVP-XAUUSD-M5.set  InpExportParity=true
btcusd-m5      KK-MasterVP-BTCUSD-M5.set  InpExportParity=true

# --- Prop (tighter risk: lower per-trade risk + firm DD caps) ---------------
# STANDING RULE: prop variant encodes firm limits Max daily loss 4.4% + Max
# account drawdown ~10% (FN Stellar-2). DD GUARDS (2026-06-30, operator-set):
# soft-brake at 8.3% trailing-peak DD -> HALF risk (0.5x lots) to de-risk at the
# cliff edge (PeakDDLotMult is stateless -> auto-resets to full size once DD<8.3%),
# hard halt at 9.5% as the final backstop, safely below the firm's 10% line.
# (InpMaxDailyDDPct=4.4 / InpSoftBlockDDPct=8.3 / InpSoftBlockLotMult=0.5 / InpMaxPeakDDPct=9.5.)
xauusd-m5-prop KK-MasterVP-XAUUSD-M5.set  InpRiskAccPct=0.5 InpMaxDailyDDPct=4.4 InpSoftBlockDDPct=8.3 InpSoftBlockLotMult=0.5 InpMaxPeakDDPct=9.5 InpExportParity=true
btcusd-m5-prop KK-MasterVP-BTCUSD-M5.set  InpRiskAccPct=0.5 InpMaxDailyDDPct=4.4 InpSoftBlockDDPct=8.3 InpSoftBlockLotMult=0.5 InpMaxPeakDDPct=9.5 InpExportParity=true

# --- Mixed Portfolio: FundedNext Stellar-2 $100K (MasterVP M5 leg) -----------
# Shares ONE account with the KK-KenKem M1 leg; risk cut so the COMBINED book
# fits FN Stellar-2 (max daily 5% / max account DD 10%). Joint DD caps: daily
# 3.5%, soft-brake at 5% (0.4x lots), hard halt 8%. See KK-KenKem mixed leg +
# Presets/Mixed-Portfolio/README.md. Values mirror the validated FN-Stellar2 set.
xauusd-m5-mixed-fn KK-MasterVP-XAUUSD-M5.set  InpRiskAccPct=0.08 InpMaxDailyDDPct=3.5 InpMaxPeakDDPct=8.0 InpSoftBlockDDPct=5.0 InpSoftBlockLotMult=0.4 InpExportParity=true
